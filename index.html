<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Your Personal AI Agent – Instagram Caption Generator</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
  <style>
    body {
      font-family: 'Poppins', sans-serif;
      margin: 0;
      padding: 2rem;
      background: linear-gradient(135deg, #fce3ec, #ffe6fa);
      color: #333;
    }

    .container {
      max-width: 650px;
      margin: auto;
      background-color: #fff;
      padding: 2rem 2.5rem;
      border-radius: 18px;
      box-shadow: 0 10px 20px rgba(0,0,0,0.1);
    }

    h1 {
      text-align: center;
      font-weight: 600;
      font-size: 2.4rem;
      color: #ff1493;
      margin-bottom: 2rem;
    }

    form {
      display: flex;
      flex-direction: column;
      gap: 1.2rem;
    }

    input, select, button {
      padding: 1rem;
      font-size: 1rem;
      border-radius: 12px;
      border: 1px solid #ccc;
    }

    input:focus, select:focus {
      outline: none;
      border-color: #ff69b4;
      box-shadow: 0 0 5px #ffb6c1;
    }

    button {
      background-color: #ff1493;
      color: white;
      font-weight: 600;
      border: none;
      cursor: pointer;
      transition: 0.2s;
    }

    button:hover {
      background-color: #e01187;
    }

    .caption-output {
      margin-top: 2rem;
      background-color: #fff0f5;
      border-left: 5px solid #ff69b4;
      padding: 1.2rem;
      border-radius: 10px;
    }

    .copy-btn {
      margin-top: 1rem;
      padding: 0.6rem 1rem;
      font-size: 0.9rem;
      background-color: #333;
      color: #fff;
      border: none;
      border-radius: 8px;
      cursor: pointer;
    }

    .copy-btn:hover {
      background-color: #000;
    }

    @media (max-width: 600px) {
      .container {
        padding: 1.5rem;
      }

      h1 {
        font-size: 2rem;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>🤖 Your Personal AI Agent</h1>

    <form method="POST">
      <input type="text" name="prompt" placeholder="Describe your Instagram post..." required />
      <select name="niche" required>
        <option value="">Select niche</option>
        <option value="fashion">Fashion</option>
        <option value="travel">Travel</option>
        <option value="fitness">Fitness</option>
        <option value="motivation">Motivation</option>
        <option value="beauty">Beauty</option>
        <option value="food">Food</option>
        <option value="pets">Pets</option>
        <option value="funny">Funny</option>
      </select>
      <button type="submit">Generate Caption</button>
    </form>

    {% if caption %}
    <div class="caption-output">
      <strong>Your Caption:</strong>
      <p id="caption">{{ caption }}</p>
      <button class="copy-btn" onclick="copyCaption()">📋 Copy Caption</button>
    </div>
    {% endif %}
  </div>

  <script>
    function copyCaption() {
      const caption = document.getElementById("caption").innerText;
      navigator.clipboard.writeText(caption);
      alert("📋 Caption copied!");
    }
  </script>
</body>
</html>
